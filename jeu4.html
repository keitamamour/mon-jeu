<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Pro Max</title>

<style>
body {
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

h1 { margin:10px; }

#info { font-size:18px; margin:10px; }

.board {
    display:grid;
    grid-template-columns:repeat(15,25px);
    gap:2px;
    justify-content:center;
}

.cell {
    width:25px;
    height:25px;
    background:#222;
}

.red { background:red; }
.blue { background:blue; }
.green { background:lime; }
.yellow { background:gold; }

button {
    padding:10px;
    font-size:16px;
    margin:10px;
}
</style>
</head>

<body>

<h1>🎲 Ludo Pro Max</h1>
<div id="info">Tour: Rouge</div>
<button onclick="rollDice()">🎲 Lancer</button>

<div id="board" class="board"></div>

<script>
const size = 15*15;
let board = [];

let players = ["red","blue","green","yellow"];
let turnIndex = 0;
let dice = 0;

/* positions (chemin simplifié circulaire) */
let path = [...Array(52).keys()];

let playerPos = {
    red: -1,
    blue: -1,
    green: -1,
    yellow: -1
};

/* créer plateau */
function createBoard(){
    let b=document.getElementById("board");
    b.innerHTML="";
    board=[];

    for(let i=0;i<size;i++){
        let d=document.createElement("div");
        d.className="cell";
        b.appendChild(d);
        board.push(d);
    }
}

/* afficher */
function updateBoard(){
    board.forEach(c=>c.className="cell");

    players.forEach(p=>{
        let pos = playerPos[p];
        if(pos >= 0 && pos < path.length){
            board[path[pos]].classList.add(p);
        }
    });
}

/* dé */
function rollDice(){
    dice = Math.floor(Math.random()*6)+1;

    let player = players[turnIndex];

    alert(player + " 🎲 " + dice);

    /* sortir de base */
    if(playerPos[player] === -1){
        if(dice === 6){
            playerPos[player] = 0;
        }
    } else {
        playerPos[player] += dice;

        /* victoire */
        if(playerPos[player] >= path.length){
            alert(player + " gagne 🏆");
            location.reload();
            return;
        }
    }

    /* capture */
    players.forEach(p=>{
        if(p !== player && playerPos[p] === playerPos[player]){
            playerPos[p] = -1;
        }
    });

    updateBoard();

    /* rejouer si 6 */
    if(dice !== 6){
        turnIndex = (turnIndex + 1) % players.length;
    }

    document.getElementById("info").innerText =
        "Tour: " + players[turnIndex];
}

createBoard();
updateBoard();
</script>

</body>
</html>
