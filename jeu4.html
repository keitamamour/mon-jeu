<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pierre Feuille Ciseaux</title>

<style>
body {
    text-align:center;
    font-family:Arial;
    background:#111;
    color:white;
}

button {
    padding:15px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#result {
    margin-top:20px;
    font-size:22px;
}
</style>
</head>

<body>

<h1>✊ Pierre Feuille Ciseaux</h1>

<button onclick="jouer('pierre')">🪨 Pierre</button>
<button onclick="jouer('feuille')">📄 Feuille</button>
<button onclick="jouer('ciseaux')">✂️ Ciseaux</button>

<div id="result"></div>
<div id="score"></div>

<script>
let scoreJoueur = 0;
let scoreOrdi = 0;

function jouer(choixJoueur){
    let choix = ["pierre","feuille","ciseaux"];
    let choixOrdi = choix[Math.floor(Math.random()*3)];

    let result = "Ordi: " + choixOrdi + "<br>";

    if(choixJoueur === choixOrdi){
        result += "Égalité 🤝";
    }
    else if(
        (choixJoueur === "pierre" && choixOrdi === "ciseaux") ||
        (choixJoueur === "feuille" && choixOrdi === "pierre") ||
        (choixJoueur === "ciseaux" && choixOrdi === "feuille")
    ){
        result += "Tu gagnes 🎉";
        scoreJoueur++;
    }
    else{
        result += "Tu perds 😢";
        scoreOrdi++;
    }

    document.getElementById("result").innerHTML = result;
    document.getElementById("score").innerHTML =
        "Score → Toi: " + scoreJoueur + " | Ordi: " + scoreOrdi;
}
</script>

</body>
</html>
