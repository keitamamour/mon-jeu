<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast Ultimate</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

h1 { margin:10px; }

#score, #best {
    font-size:18px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(10,30px);
    gap:2px;
    justify-content:center;
    margin:10px;
}

.cell {
    width:30px;
    height:30px;
    background:#222;
    border-radius:5px;
    transition:0.2s;
}

.block-zone {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.block {
    display:grid;
    gap:2px;
    cursor:pointer;
    border:2px solid transparent;
}

.block.selected {
    border:2px solid yellow;
    transform:scale(1.1);
}

.block div {
    width:20px;
    height:20px;
    border-radius:3px;
}

/* explosion */
@keyframes boom {
    0% { transform:scale(1); opacity:1;}
    100% { transform:scale(1.5); opacity:0;}
}
.boom {
    animation: boom 0.3s;
}
</style>
</head>

<body>

<h1>🧩 Block Blast</h1>
<div id="score">Score: 0</div>
<div id="best">🏆 Best: 0</div>

<button onclick="startMusic()">🎧 Musique</button>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="placeSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<audio id="clearSound">
  <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3">
</audio>

<div id="grid" class="grid"></div>
<div class="block-zone" id="blocks"></div>

<script>
let ghost = null;
let dragBlock = null;

document.querySelectorAll(".block").forEach(block => {
    block.addEventListener("touchstart", e => {
        dragBlock = block;

        let rect = block.getBoundingClientRect();

        ghost = block.cloneNode(true);
        ghost.style.position = "fixed";
        ghost.style.left = rect.left + "px";
        ghost.style.top = rect.top + "px";
        ghost.style.opacity = "0.7";
        ghost.style.pointerEvents = "none";
        document.body.appendChild(ghost);
    });
});

document.addEventListener("touchmove", e => {
    if(!ghost) return;

    let touch = e.touches[0];
    ghost.style.left = (touch.clientX - 30) + "px";
    ghost.style.top = (touch.clientY - 30) + "px";
});

document.addEventListener("touchend", e => {
    if(!ghost) return;

    let touch = e.changedTouches[0;

    let element = document.elementFromPoint(touch.clientX, touch.clientY);

    if(element && element.classList.contains("cell")){
        let index = Array.from(document.querySelectorAll(".cell")).indexOf(element);

        // utiliser ton système existant
        placeBlock(index);
    }

    ghost.remove();
    ghost = null;
    dragBlock = null;
});
</script>

</body>
</html>
