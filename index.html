<!DOCTYPE html>
<html>
<head>
<title>Jeu Addictif</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background: linear-gradient(-45deg, #ff0000, #0000ff, #00ffcc, #ffcc00);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.box {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 20px;
    margin-top: 80px;
    display: inline-block;
}

button, input {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

#score {
    position: fixed;
    top: 10px;
    left: 10px;
}
</style>
</head>

<body>

<!-- 🎧 audio -->
<audio id="bgMusic" loop></audio>
<audio id="winSound"></audio>
<audio id="clickSound"></audio>

<div id="score">🏆 Score : -</div>

<div class="box">
<h1>🎮 Devine le nombre</h1>

<input id="input" type="number">
<br>

<button onclick="verifier()">Deviner</button>
<br>

<button onclick="startMusic()">🎧 Activer musique</button>

<p id="resultat"></p>
</div>

<script>
let nombre_secret = Math.floor(Math.random() * 40) + 1;
let essais = 0;

// 🔥 charger sons fiables
let bg = document.getElementById("bgMusic");
let win = document.getElementById("winSound");
let click = document.getElementById("clickSound");

// ⚠️ liens simples qui marchent mieux
bg.src = "https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3";
win.src = "https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3";
click.src = "https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3";

// 🎧 start musique
function startMusic() {
    bg.volume = 0.2;
    bg.play().catch(()=>alert("Clique encore pour activer le son"));
}

// 🎮 jeu
function verifier() {
    click.play();

    let devine = document.getElementById("input").value;
    essais++;

    if (devine == nombre_secret) {
        document.getElementById("resultat").innerText =
        "🎉 Gagné en " + essais + " essais";

        win.play();

        nombre_secret = Math.floor(Math.random() * 40) + 1;
        essais = 0;
    }
    else if (devine < nombre_secret) {
        document.getElementById("resultat").innerText = "📉 Trop petit";
    }
    else {
        document.getElementById("resultat").innerText = "📈 Trop grand";
    }
}
</script>

</body>
</html>
