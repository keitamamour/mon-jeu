<!DOCTYPE html>
<html>
<head>
<title>Mon Jeu</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    overflow: hidden;

    background: linear-gradient(-45deg, #ff0000, #0000ff, #00ffcc, #ffcc00);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.box {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    margin-top: 100px;
    display: inline-block;
}

#score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

button {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* 🎆 confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: 0;
    animation: fall 2s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

/* 😭 secousse */
.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    50% { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
}
</style>
</head>

<body>

<!-- 🎧 musique -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c5c2e9c3b.mp3" type="audio/mpeg">
</audio>

<!-- 🔥 victoire -->
<audio id="winSound">
  <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b0c7443e.mp3" type="audio/mpeg">
</audio>

<div id="score">🏆 Meilleur score : -</div>

<div class="box" id="game">
<h1>🎮 Devine le nombre</h1>
<p>Entre 1 et 40</p>

<input id="input" type="number">
<br>

<button onclick="verifier()">Deviner</button>
<br>

<!-- 🎧 bouton musique -->
<button onclick="startMusic()">🎧 Play musique</button>

<p id="resultat"></p>
</div>

<script>
let nombre_secret = Math.floor(Math.random() * 40) + 1;
let essais = 0;

let meilleur_score = localStorage.getItem("score");

if (meilleur_score) {
    document.getElementById("score").innerText =
    "🏆 Meilleur score : " + meilleur_score;
}

/* 🎧 lancer musique */
function startMusic() {
    let music = document.getElementById("bgMusic");
    music.volume = 0.3;
    music.play();
}

function verifier() {
    let devine = document.getElementById("input").value;
    essais++;

    if (devine == nombre_secret) {
        document.getElementById("resultat").innerText =
        "🎉 BINGO ! Trouvé en " + essais + " essais !";

        document.getElementById("winSound").play();
        explosion();

        if (!meilleur_score || essais < meilleur_score) {
            meilleur_score = essais;
            localStorage.setItem("score", essais);
            document.getElementById("score").innerText =
            "🏆 Meilleur score : " + essais;
        }

        setTimeout(() => {
            nombre_secret = Math.floor(Math.random() * 40) + 1;
            essais = 0;
            document.getElementById("resultat").innerText = "";
        }, 2000);
    }

    else if (devine < nombre_secret) {
        document.getElementById("resultat").innerText = "📉 Trop petit";
        secousse();
    }

    else {
        document.getElementById("resultat").innerText = "📈 Trop grand";
        secousse();
    }
}

/* 🎆 explosion */
function explosion() {
    for (let i = 0; i < 60; i++) {
        let div = document.createElement("div");
        div.classList.add("confetti");
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        document.body.appendChild(div);

        setTimeout(() => div.remove(), 2000);
    }
}

/* 😭 raté */
function secousse() {
    let game = document.getElementById("game");
    game.classList.add("shake");

    setTimeout(() => {
        game.classList.remove("shake");
    }, 300);
}
</script>

</body>
</html>
