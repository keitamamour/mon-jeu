<!DOCTYPE html>
<html>
<head>
    <title>Mon Jeu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        /* 🎨 fond animé */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc, #ffcc00);
            animation: move 10s linear infinite;
            z-index: -1;
        }

        @keyframes move {
            0% { transform: translate(0,0); }
            50% { transform: translate(-25%, -25%); }
            100% { transform: translate(0,0); }
        }

        .box {
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 20px;
            margin-top: 100px;
            display: inline-block;
        }

        input, button {
            padding: 10px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            margin: 10px;
        }

        button {
            background: orange;
            cursor: pointer;
        }

        #resultat {
            font-size: 24px;
            margin-top: 20px;
        }

        /* 🎆 particules */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: yellow;
            top: 0;
            animation: fall 2s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div class="box">
<h1>🎮 Devine le nombre</h1>
<p>Entre 1 et 40</p>

<input id="input" type="number">
<br>
<button onclick="verifier()">Deviner</button>

<p id="resultat"></p>
</div>

<script>
let nombre_secret = Math.floor(Math.random() * 40) + 1;
let essais = 0;

function verifier() {
    let devine = document.getElementById("input").value;
    essais++;

    if (devine == nombre_secret) {
        document.getElementById("resultat").innerText =
        "🎉 GAGNÉ en " + essais + " essais !";

        explosion(); // 💥 effet stylé
    }
    else if (devine < nombre_secret) {
        document.getElementById("resultat").innerText = "📉 Trop petit";
    }
    else {
        document.getElementById("resultat").innerText = "📈 Trop grand";
    }
}

// 🎆 effet pétard
function explosion() {
    for (let i = 0; i < 50; i++) {
        let div = document.createElement("div");
        div.classList.add("confetti");
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        document.body.appendChild(div);

        setTimeout(() => div.remove(), 2000);
    }
}
</script>

</body>
</html>
