<!DOCTYPE html>
<html>
<head>
<title>Mon Jeu</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* 🌌 fond animé style anime */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #ff6600, #000033, #00ccff);
    animation: anime 8s infinite alternate;
    z-index: -1;
}

@keyframes anime {
    0% { transform: scale(1); }
    100% { transform: scale(1.2); }
}

.box {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    margin-top: 100px;
    display: inline-block;
}

#score {
    position: fixed;
    top: 10px;
    left: 10px;
}

/* 🎆 confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: 0;
    animation: fall 2s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

/* 😭 animation raté */
.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    50% { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
}
</style>
</head>

<body>

<div id="score">🏆 Meilleur score : -</div>

<div class="box" id="game">
<h1>🎮 Devine le nombre</h1>
<p>Entre 1 et 40</p>

<input id="input" type="number">
<button onclick="verifier()">Deviner</button>

<p id="resultat"></p>
</div>

<script>
let nombre_secret = Math.floor(Math.random() * 40) + 1;
let essais = 0;

let meilleur_score = localStorage.getItem("score");

if (meilleur_score) {
    document.getElementById("score").innerText =
    "🏆 Meilleur score : " + meilleur_score;
}

function verifier() {
    let devine = document.getElementById("input").value;
    essais++;

    if (devine == nombre_secret) {
        document.getElementById("resultat").innerText =
        "🎉 BINGO ! Trouvé en " + essais + " essais !";

        explosion();

        if (!meilleur_score || essais < meilleur_score) {
            meilleur_score = essais;
            localStorage.setItem("score", essais);
            document.getElementById("score").innerText =
            "🏆 Meilleur score : " + essais;
        }

        setTimeout(() => {
            nombre_secret = Math.floor(Math.random() * 40) + 1;
            essais = 0;
            document.getElementById("resultat").innerText = "";
        }, 2000);
    }

    else if (devine < nombre_secret) {
        document.getElementById("resultat").innerText = "📉 Trop petit";

        secousse();
    }

    else {
        document.getElementById("resultat").innerText = "📈 Trop grand";

        secousse();
    }
}

/* 🎆 explosion */
function explosion() {
    for (let i = 0; i < 60; i++) {
        let div = document.createElement("div");
        div.classList.add("confetti");
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        document.body.appendChild(div);

        setTimeout(() => div.remove(), 2000);
    }
}

/* 😭 effet raté */
function secousse() {
    let game = document.getElementById("game");
    game.classList.add("shake");

    setTimeout(() => {
        game.classList.remove("shake");
    }, 300);
}
</script>

</body>
</html>
